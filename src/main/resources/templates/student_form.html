<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header(${isEdit ? 'Edit Student' : 'Add Student'})}"></head>
<body>

<div th:replace="~{fragments :: sidebar('students')}"></div>

<div id="main-content">
    <div class="container-fluid">
        <h2 class="mb-4 display-4 fw-bold" style="color: #1e293b; letter-spacing: -2px;" 
            th:text="${isEdit ? 'Edit Student Record' : 'Register New Student'}">Student Form</h2>
        
        <div class="portal-card max-width-700 mx-auto mt-2" style="border-radius: 40px; max-width: 800px;">
            <div th:if="${error}" class="alert alert-danger border-0 shadow-sm rounded-4 p-3 mb-4 d-flex align-items-center" style="background: #fef2f2; color: #dc2626;">
                <div class="me-3 fs-5">❌</div>
                <div class="fw-bold" th:text="${error}">Error Message</div>
            </div>

            <form th:action="@{/students/save}" th:object="${student}" method="POST" class="row g-4">
                <input type="hidden" th:field="*{email}" th:if="${isEdit}">
                
                <div class="col-md-6">
                    <label class="form-label fw-bold text-muted small text-uppercase">Registration Number</label>
                    <input type="number" th:field="*{regNumber}" class="form-control p-3 border-2 rounded-4" 
                           th:readonly="${isEdit}" placeholder="e.g. 2024001" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold text-muted small text-uppercase">Email Address</label>
                    <input type="email" th:field="*{email}" class="form-control p-3 border-2 rounded-4" 
                           th:readonly="${isEdit}" placeholder="student@college.edu" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold text-muted small text-uppercase">First Name</label>
                    <input type="text" th:field="*{firstName}" class="form-control p-3 border-2 rounded-4" 
                           placeholder="Enter first name" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold text-muted small text-uppercase">Last Name</label>
                    <input type="text" th:field="*{lastName}" class="form-control p-3 border-2 rounded-4" 
                           placeholder="Enter last name" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-bold text-muted small text-uppercase">Department</label>
                    <input type="text" th:field="*{department}" class="form-control p-3 border-2 rounded-4" 
                           placeholder="e.g. Computer Science Science" required>
                </div>

                <div class="col-12 mt-5">
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-premium btn-lg w-100 py-3" 
                                th:text="${isEdit ? 'Update Student Profile' : 'Save New Student'}">Submit Form</button>
                        <a th:href="@{/students}" class="btn btn-light btn-lg w-100 py-3 rounded-4 border-2 fw-bold text-muted shadow-sm">Cancel</a>
                    </div>
                </div>
            </form>
        </div>

        <div th:replace="~{fragments :: footer}"></div>
    </div>
</div>

</body>
</html>
