# Database Credentials
# cachePrepStmts + useServerPrepStmts: reuse parsed SQL on the MySQL server side
# rewriteBatchedStatements: batch INSERTs/UPDATEs into a single round-trip
# useSSL=false + allowPublicKeyRetrieval: skip SSL handshake overhead on local dev
spring.datasource.url=jdbc:mysql://localhost:3306/school_registration?cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&rewriteBatchedStatements=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Jose@2026db

# MySQL driver (explicit - avoids auto-detection overhead)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Core JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server & Main Config
server.port=8000
spring.main.allow-bean-definition-overriding=true
spring.thymeleaf.cache=true

# Hibernate Performance Tuning
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true
spring.jpa.properties.hibernate.fetch_size=150
spring.jpa.properties.hibernate.default_batch_fetch_size=16
# Reduce schema validation overhead on startup
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Startup Speed Optimization (Crucial for Desktop Apps)
spring.main.lazy-initialization=true

# Database Connection Pool Tuning (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=10000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000
# Validate connection before handing it out — avoids stale connection errors
spring.datasource.hikari.connection-test-query=SELECT 1