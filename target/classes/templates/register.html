<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Registration</title>
    
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 for Layout Utilities -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <!-- Custom Rich Styling -->
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .auth-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            padding: 0 1rem;
            z-index: 10;
        }

        /* Decorative Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.6;
            animation: float 8s ease-in-out infinite alternate;
        }
        .blob-1 {
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.4);
            top: -100px;
            left: -100px;
        }
        .blob-2 {
            width: 250px;
            height: 250px;
            background: rgba(168, 85, 247, 0.4);
            bottom: -50px;
            right: -100px;
            animation-delay: 2s;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-header h2 {
            font-weight: 700;
            font-size: 2rem;
            background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .brand-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-floating {
            margin-bottom: 1.5rem;
        }

        .form-control {
            border: 2px solid #e5e7eb;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-floating label {
            padding: 1rem 1.25rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .btn-register {
            background: linear-gradient(135deg, var(--primary-color) 0%, #818cf8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .login-link a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .error-badge {
            display: flex;
            align-items: center;
            background-color: #fee2e2;
            color: #ef4444;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid #ef4444;
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Background Decoration -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="auth-wrapper">
        <div class="glass-card">
            <div class="brand-header">
                <h2>Create Account</h2>
                <p>Join our professional platform today.</p>
            </div>
            
            <!-- Error Messages -->
            <div th:if="${param.error != null and param.error[0] == 'exists'}" class="error-badge">
                <svg width="20" height="20" fill="currentColor" class="me-2" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                Email is already registered. Please login.
            </div>
            <div th:if="${param.error != null and param.error[0] == 'username'}" class="error-badge">
                <svg width="20" height="20" fill="currentColor" class="me-2" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                Username is already taken. Choose another.
            </div>

            <!-- Registration Form -->
            <form th:action="@{/register}" th:object="${user}" method="post">
                
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="johndoe" required autocomplete="off">
                    <label for="username">Username</label>
                </div>
                
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="name@example.com" required autocomplete="email">
                    <label for="email">Email address</label>
                </div>
                
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Password" required autocomplete="new-password">
                    <label for="password">Password</label>
                </div>
                
                <button type="submit" class="btn btn-register">
                    Create Account
                </button>
            </form>
            
            <div class="login-link">
                Already have an account? <a th:href="@{/login}">Sign in here</a>
            </div>
        </div>
    </div>

</body>
</html>
